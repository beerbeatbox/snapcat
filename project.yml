name: Snapcat
options:
  bundleIdPrefix: com.beer
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
targets:
  Snapcat:
    type: application
    platform: macOS
    sources:
      - path: Snapcat
    dependencies:
      - package: Sparkle
    info:
      path: Snapcat/Info.plist
      properties:
        CFBundleDisplayName: Snapcat
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.utilities
        NSHumanReadableCopyright: "© 2026 Beer"
        SUFeedURL: https://raw.githubusercontent.com/beerbeatbox/snapcat/main/appcast.xml
        SUPublicEDKey: otSxCQ8WhzjbepIAsPKPlmdRvpG8cDIvYNA5iTd96b8=
        SUEnableAutomaticChecks: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beer.snapcat
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: YYVT547SZ7
        ENABLE_HARDENED_RUNTIME: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 2
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          ENABLE_HARDENED_RUNTIME: YES
          OTHER_CODE_SIGN_FLAGS: "--timestamp"
          DEAD_CODE_STRIPPING: YES
          # Plain `xcodebuild build` injects the debug-only get-task-allow
          # entitlement even in Release; notarization rejects it.
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
