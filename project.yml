name: Snapcat
options:
  bundleIdPrefix: com.beer
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  Snapcat:
    type: application
    platform: macOS
    sources:
      - path: Snapcat
    info:
      path: Snapcat/Info.plist
      properties:
        CFBundleDisplayName: Snapcat
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSUIElement: true
        NSHumanReadableCopyright: "© 2026 Beer"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beer.snapcat
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: YYVT547SZ7
        ENABLE_HARDENED_RUNTIME: NO
